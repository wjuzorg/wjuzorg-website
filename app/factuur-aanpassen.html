<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Factuur aanpassen - WJU Zorg</title>

  <style>
    body{
      font-family:Arial, Helvetica, sans-serif;
      background:#f3f3f3;
      margin:0;
      color:#222;
    }

    .container{
      max-width:820px;
      margin:auto;
      padding:20px;
    }

    .page-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .back-link{
      text-decoration:none;
      background:#eee;
      padding:10px 14px;
      border-radius:8px;
      font-size:0.95rem;
      color:#333;
      white-space:nowrap;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
      border:1px solid #e3e3e3;
      box-shadow:0 3px 8px rgba(0,0,0,0.06);
    }

    .section-title{
      font-weight:bold;
      font-size:1.1rem;
      margin-bottom:12px;
    }

    .muted{
      color:#666;
      font-size:0.95rem;
      line-height:1.5;
    }

    .error{
      background:#fff1f1;
      color:#a40000;
      border:1px solid #f1b5b5;
      padding:12px;
      border-radius:10px;
      margin-bottom:15px;
    }

    .success{
      background:#eefaf0;
      color:#176a2f;
      border:1px solid #b7e1c0;
      padding:12px;
      border-radius:10px;
      margin-bottom:15px;
    }

    .invoice-edit-row{
      border:1px solid #ececec;
      border-radius:12px;
      padding:16px;
      margin-bottom:14px;
      background:#fafafa;
    }

    .row-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    .row-title{
      font-weight:bold;
      font-size:1rem;
    }

    .row-status{
      color:#666;
      font-size:0.9rem;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 140px 160px;
      gap:12px;
      margin-bottom:12px;
    }

    label{
      display:block;
      font-size:0.9rem;
      color:#555;
      margin-bottom:6px;
    }

    input{
      width:100%;
      box-sizing:border-box;
      padding:10px 12px;
      border:1px solid #d8d8d8;
      border-radius:8px;
      font-size:0.98rem;
      background:white;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .btn{
      background:#28a745;
      color:white;
      border:none;
      padding:10px 14px;
      border-radius:8px;
      cursor:pointer;
      text-decoration:none;
      font-size:0.95rem;
    }

    .btn-secondary{
      background:#eee;
      color:#333;
    }

    @media (max-width:700px){
      .grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="page-header">
      <h2>Factuur aanpassen</h2>
      <a href="facturen.html" class="back-link">← Terug naar facturen</a>
    </div>

    <div id="messageBox"></div>
    <div id="content"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = "https://ligdgbdhreatsuejcinq.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_sGbFKRRB3YzizqbEiz3wQg_Vkxt54_j";

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    function euro(amount){
      return Number(amount || 0).toLocaleString("nl-NL", {
        style: "currency",
        currency: "EUR"
      });
    }

    function formatDate(value){
      if(!value) return "-";
      const d = new Date(value);
      if (isNaN(d)) return "-";
      return d.toLocaleDateString("nl-NL");
    }

    function showMessage(type, text){
      const box = document.getElementById("messageBox");
      box.innerHTML = `<div class="${type}">${text}</div>`;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function saveInvoiceItem(id){
      const serviceInput = document.getElementById(`service_${id}`);
      const minutesInput = document.getElementById(`minutes_${id}`);
      const amountInput = document.getElementById(`amount_${id}`);

      const service_type = serviceInput.value.trim();
      const duration_minutes = Number(minutesInput.value);
      const amount_snapshot = Number(amountInput.value);

      if(!service_type){
        showMessage("error", "Vul eerst een soort hulp in.");
        return;
      }

      if(!duration_minutes || duration_minutes < 1){
        showMessage("error", "Vul een geldig aantal minuten in.");
        return;
      }

      if(isNaN(amount_snapshot) || amount_snapshot < 0){
        showMessage("error", "Vul een geldig bedrag in.");
        return;
      }

      const { error } = await supabaseClient
        .from("invoice_items")
        .update({
          service_type,
          duration_minutes,
          amount_snapshot
        })
        .eq("id", id);

      if(error){
        showMessage("error", "Fout bij opslaan: " + error.message);
        return;
      }

      showMessage("success", "Factuurregel opgeslagen.");
      loadPage();
    }

    async function loadPage(){
      const content = document.getElementById("content");
      const client = new URLSearchParams(window.location.search).get("client");

      if(!client){
        content.innerHTML = `<div class="error">Geen cliënt meegegeven.</div>`;
        return;
      }

      document.title = "Factuur aanpassen - " + client;

      const { data, error } = await supabaseClient
        .from("invoice_items")
        .select("*")
        .eq("client_name", client)
        .in("status", ["open", "verzonden", "herinnering_verstuurd", "betaald"])
        .order("created_at", { ascending: false });

      if(error){
        content.innerHTML = `<div class="error">Fout bij laden: ${error.message}</div>`;
        return;
      }

      if(!data || data.length === 0){
        content.innerHTML = `<div class="card">Geen factuurregels gevonden voor ${client}.</div>`;
        return;
      }

      let html = `
        <div class="card">
          <div class="section-title">${client}</div>
          <div class="muted">
            Hier kunt u per factuurregel de soort hulp, minuten en het bedrag aanpassen.
          </div>
        </div>
      `;

      data.forEach(item => {
        html += `
          <div class="invoice-edit-row">
            <div class="row-top">
              <div>
                <div class="row-title">${item.service_type || "-"}</div>
                <div class="row-status">
                  Status: ${item.status || "onbekend"}<br>
                  Verzonden op: ${formatDate(item.sent_at)}<br>
                  Betaald op: ${formatDate(item.paid_at)}
                </div>
              </div>

              <div class="muted">
                Huidig bedrag: <strong>${euro(item.amount_snapshot || 0)}</strong>
              </div>
            </div>

            <div class="grid">
              <div>
                <label for="service_${item.id}">Soort hulp</label>
                <input id="service_${item.id}" type="text" value="${(item.service_type || "").replace(/"/g, '&quot;')}">
              </div>

              <div>
                <label for="minutes_${item.id}">Minuten</label>
                <input id="minutes_${item.id}" type="number" min="1" value="${item.duration_minutes || 0}">
              </div>

              <div>
                <label for="amount_${item.id}">Bedrag (€)</label>
                <input id="amount_${item.id}" type="number" min="0" step="0.01" value="${item.amount_snapshot || 0}">
              </div>
            </div>

            <div class="actions">
              <button class="btn" onclick="saveInvoiceItem('${item.id}')">Opslaan</button>
            </div>
          </div>
        `;
      });

      content.innerHTML = html;
    }

    loadPage();
  </script>
</body>
</html>
