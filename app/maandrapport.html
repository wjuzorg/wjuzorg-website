<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Maandrapportage - WJU Zorg</title>

<style>

@media print{
  .btn{
    display:none;
  }

  body{
    background:white;
  }

  .container{
    max-width:none;
    padding:0;
  }

  .card{
    box-shadow:none;
    border:1px solid #ddd;
    break-inside:avoid;
  }

  .topbar{
    display:block;
    margin-bottom:20px;
  }
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#f3f3f3;
margin:0;
color:#222;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
border:1px solid #e3e3e3;
box-shadow:0 3px 8px rgba(0,0,0,0.06);
}

.section-title{
font-weight:bold;
margin-bottom:12px;
font-size:1.1rem;
}

.row{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #eee;
}

.row:last-child{
border-bottom:none;
}

.btn{
background:#28a745;
color:white;
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
text-decoration:none;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
}

</style>
</head>

<body>

<div class="container">

<div style="text-align:center; margin:30px 0 10px 0;">
<img src="logofactuur.jpg" style="max-width:220px;">
</div>

<div class="topbar">
  <h2>Maandrapportage</h2>
  
  <div class="card" style="margin-top:10px;">
  <div class="section-title">Kies maand</div>

  <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
    <input type="month" id="reportMonth">
    <button class="btn" onclick="loadRapport()">Rapport tonen</button>
  </div>
</div>

  <div style="display:flex; gap:10px; flex-wrap:wrap;">
    <button class="btn" onclick="window.print()">Rapport / PDF</button>
    <a href="today.html" class="btn">← Terug naar Today</a>
  </div>
</div>

<div id="rapport"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = "https://ligdgbdhreatsuejcinq.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_sGbFKRRB3YzizqbEiz3wQg_Vkxt54_j";

const supabaseClient = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

function setDefaultMonth(){
  const monthInput = document.getElementById("reportMonth");
  const now = new Date();
  const year = now.getFullYear();
  const month = String(now.getMonth() + 1).padStart(2, "0");
  monthInput.value = `${year}-${month}`;
}

async function loadRapport(){
  const rapportEl = document.getElementById("rapport");
  const selectedMonth = document.getElementById("reportMonth").value;

  if(!selectedMonth){
    rapportEl.innerHTML = `<div class="card">Kies eerst een maand.</div>`;
    return;
  }

  const [year, month] = selectedMonth.split("-");

  const { data: invoiceData, error: invoiceError } = await supabaseClient
    .from("invoice_items")
    .select("*");

  if(invoiceError){
    rapportEl.innerHTML = `<div class="card">Fout bij laden rapport</div>`;
    return;
  }

  const { data: requestData, error: requestError } = await supabaseClient
    .from("requests")
    .select("*");

  if(requestError){
    rapportEl.innerHTML = `<div class="card">Fout bij laden signaleringen</div>`;
    return;
  }

  const invoices = invoiceData || [];
  const requests = requestData || [];

  let totalMinutes = 0;
  let totalAppointments = 0;
  let totalSignals = 0;

  const clientSet = new Set();
  const wijkStats = {};
  const serviceStats = {};
  const wijkServiceStats = {};
  const clientWijkMap = {};

  requests.forEach(item => {
    if(item.full_name && item.wijk){
      clientWijkMap[item.full_name] = item.wijk;
    }

    if(!item.created_at) return;

    const d = new Date(item.created_at);
    const itemYear = String(d.getFullYear());
    const itemMonth = String(d.getMonth() + 1).padStart(2, "0");

    if(itemYear !== year || itemMonth !== month){
      return;
    }

    const hasSignal =
      item.risk_dropout ||
      item.needs_extra_support ||
      item.hard_to_reach ||
      item.observed_decline ||
      (item.internal_signal_notes && item.internal_signal_notes.trim() !== "");

    if(hasSignal){
      totalSignals++;
    }
  });

  invoices.forEach(item => {
    if(!item.created_at) return;

    const d = new Date(item.created_at);
    const itemYear = String(d.getFullYear());
    const itemMonth = String(d.getMonth() + 1).padStart(2, "0");

    if(itemYear !== year || itemMonth !== month){
      return;
    }

    totalAppointments++;
    totalMinutes += Number(item.duration_minutes || 0);

    if(item.client_name){
      clientSet.add(item.client_name);
    }

    const wijk = clientWijkMap[item.client_name] || null;
    const service = item.service_type && item.service_type.trim() !== "" ? item.service_type : null;

    if(wijk){
      if(!wijkStats[wijk]){
        wijkStats[wijk] = { appointments: 0, minutes: 0 };
      }

      wijkStats[wijk].appointments++;
      wijkStats[wijk].minutes += Number(item.duration_minutes || 0);

      if(!wijkServiceStats[wijk]){
        wijkServiceStats[wijk] = {};
      }

      if(service){
        if(!wijkServiceStats[wijk][service]){
          wijkServiceStats[wijk][service] = 0;
        }
        wijkServiceStats[wijk][service]++;
      }
    }

    if(service){
      if(!serviceStats[service]){
        serviceStats[service] = 0;
      }
      serviceStats[service]++;
    }
  });

  let wijkHtml = "";
  const sortedWijken = Object.keys(wijkStats).sort();

  sortedWijken.forEach(wijk => {
    wijkHtml += `
      <div class="row">
        <div>${wijk}</div>
        <div>${wijkStats[wijk].appointments} afspraken</div>
      </div>
    `;
  });

  if(!wijkHtml){
    wijkHtml = `<div class="row"><div>Geen wijkgegevens gevonden</div><div>-</div></div>`;
  }

  let serviceHtml = "";
  const sortedServices = Object.keys(serviceStats).sort();

  sortedServices.forEach(service => {
    serviceHtml += `
      <div class="row">
        <div>${service}</div>
        <div>${serviceStats[service]} keer</div>
      </div>
    `;
  });

  if(!serviceHtml){
    serviceHtml = `<div class="row"><div>Geen hulpsoorten gevonden</div><div>-</div></div>`;
  }

  let wijkServiceHtml = "";
  sortedWijken.forEach(wijk => {
    wijkServiceHtml += `
      <div class="card">
        <div class="section-title">${wijk}</div>
    `;

    const servicesInWijk = Object.keys(wijkServiceStats[wijk] || {}).sort();

    if(servicesInWijk.length === 0){
      wijkServiceHtml += `
        <div class="row">
          <div>Geen hulpsoorten gevonden</div>
          <div>-</div>
        </div>
      `;
    } else {
      servicesInWijk.forEach(service => {
        wijkServiceHtml += `
          <div class="row">
            <div>${service}</div>
            <div>${wijkServiceStats[wijk][service]} keer</div>
          </div>
        `;
      });
    }

    wijkServiceHtml += `</div>`;
  });

  if(!wijkServiceHtml){
    wijkServiceHtml = `
      <div class="card">
        <div class="section-title">Per wijk - soorten hulp</div>
        <div class="row">
          <div>Geen gegevens gevonden</div>
          <div>-</div>
        </div>
      </div>
    `;
  }

  rapportEl.innerHTML = `
    <div class="card">
      <div class="section-title">Overzicht</div>

      <div class="row">
        <div>Cliënten geholpen</div>
        <div>${clientSet.size}</div>
      </div>

      <div class="row">
        <div>Afspraken</div>
        <div>${totalAppointments}</div>
      </div>

      <div class="row">
        <div>Totaal minuten hulp</div>
        <div>${totalMinutes}</div>
      </div>

      <div class="row">
        <div>Interne signaleringen</div>
        <div>${totalSignals}</div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Per wijk</div>
      ${wijkHtml}
    </div>

    <div class="card">
      <div class="section-title">Soorten hulp</div>
      ${serviceHtml}
    </div>

    <div class="section-title" style="margin:10px 0;">Per wijk - soorten hulp</div>
    ${wijkServiceHtml}
  `;
}

setDefaultMonth();
loadRapport();
</script>

</body>
</html>
