<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Facturen - WJU Zorg</title>

  <style>
    body{
      font-family:Arial, Helvetica, sans-serif;
      background:#f3f3f3;
      margin:0;
      color:#222;
    }

    .container{
      max-width:700px;
      margin:auto;
      padding:20px;
    }

    .page-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:10px;
    }

    .back-link{
      text-decoration:none;
      background:#eee;
      padding:8px 14px;
      border-radius:8px;
      font-size:0.9rem;
      color:#333;
      white-space:nowrap;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:12px;
      margin-bottom:28px;
      box-shadow:0 2px 6px rgba(0,0,0,0.05);
    }

    .total{
      font-weight:bold;
      font-size:1.2rem;
      margin-top:15px;
    }

    .small{
      font-size:0.9rem;
      color:#666;
      margin-top:10px;
      line-height:1.5;
    }

    .status{
      margin-bottom:15px;
      color:#666;
      font-size:0.95rem;
    }

    .error{
      background:#fff1f1;
      color:#a40000;
      border:1px solid #f1b5b5;
      padding:12px;
      border-radius:10px;
      margin-bottom:15px;
    }

    .empty{
      background:#fff;
      padding:18px;
      border-radius:12px;
      color:#666;
      box-shadow:0 2px 6px rgba(0,0,0,0.05);
    }

    .btn-small{
      background:#28a745;
      color:white;
      border:none;
      padding:8px 10px;
      border-radius:8px;
      font-size:0.78rem;
      cursor:pointer;
      white-space:nowrap;
    }

    .client-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      width:100%;
      margin-bottom:14px;
    }

    .client-name{
      font-weight:bold;
      flex:1;
      min-width:0;
      line-height:1.3;
      font-size:1.05rem;
    }

    .client-actions{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      justify-content:flex-end;
      max-width:58%;
    }

    .invoice-lines{
      margin-top:10px;
      border-top:1px solid #eee;
      padding-top:10px;
    }

    .invoice-line{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      padding:10px 0;
      border-bottom:1px solid #f2f2f2;
    }

    .invoice-line:last-child{
      border-bottom:none;
    }

    .line-left{
      flex:1;
      min-width:0;
    }

    .line-service{
      font-weight:600;
      margin-bottom:3px;
    }

    .line-meta{
      color:#777;
      font-size:0.9rem;
    }

    .line-amount{
      font-weight:bold;
      white-space:nowrap;
    }

    .client-subtotal{
      margin-top:12px;
      padding-top:12px;
      margin-bottom:28px;
      border-top:1px solid #ddd;
      display:flex;
      justify-content:space-between;
      font-weight:bold;
    }

    @media (max-width: 640px){
      .container{
        padding:14px;
      }

      .page-header{
        flex-direction:column;
        align-items:flex-start;
      }

      .card{
        padding:16px;
      }

      .client-header{
        flex-direction:column;
        align-items:stretch;
      }

      .client-actions{
        max-width:100%;
        justify-content:flex-start;
      }

      .btn-small{
        font-size:0.75rem;
        padding:8px 9px;
      }

      .invoice-line{
        flex-direction:column;
        align-items:flex-start;
      }

      .line-amount{
        margin-top:4px;
      }

      .client-subtotal{
        flex-direction:column;
        gap:4px;
      }

      .total{
        font-size:1.05rem;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="page-header">
      <h2>Factuur overzicht</h2>
      <a href="today.html" class="back-link">← Terug naar Today</a>
    </div>

    <div id="status" class="status">Factuurregels laden...</div>
    <div id="invoiceList"></div>

    <div class="card">
      <div class="total">Totaal: <span id="totalAmount">€0,00</span></div>

      <div class="small">
        BTW vrijgesteld van omzetbelasting volgens artikel 11 lid 1 onderdeel g Wet OB.<br>
        Betaling binnen 14 dagen.
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = "https://ligdgbdhreatsuejcinq.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_sGbFKRRB3YzizqbEiz3wQg_Vkxt54_j";

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    let invoiceItemsData = [];

    function euro(amount){
      return Number(amount || 0).toLocaleString("nl-NL", {
        style: "currency",
        currency: "EUR"
      });
    }

    async function loadInvoices() {
      const statusEl = document.getElementById("status");
      const listEl = document.getElementById("invoiceList");
      const totalEl = document.getElementById("totalAmount");

      statusEl.textContent = "Factuurregels laden...";
      listEl.innerHTML = "";
      totalEl.textContent = "€0,00";

      const { data, error } = await supabaseClient
        .from("invoice_items")
        .select("*")
        .eq("status", "open")
        .order("created_at", { ascending: false });

      if (error) {
        statusEl.innerHTML = `<div class="error">Fout: ${error.message}</div>`;
        return;
      }

      invoiceItemsData = data || [];

      if (!data || data.length === 0) {
        statusEl.textContent = "Nog geen facturen.";
        return;
      }

      statusEl.textContent = "";

      let total = 0;
      const grouped = {};

      data.forEach(item => {
        const client = item.client_name || "Onbekende cliënt";
        if (!grouped[client]) grouped[client] = [];
        grouped[client].push(item);
      });

      for (const client in grouped) {
        let clientTotal = 0;

        listEl.innerHTML += `
          <div class="card">
            <div class="client-header">
              <div class="client-name">${client}</div>

              <div class="client-actions">
                <button class="btn-small" onclick="generateInvoice('${client.replace(/'/g, "\\'")}')">
                  Factuur
                </button>

                <button class="btn-small" onclick="editInvoice('${client.replace(/'/g, "\\'")}')">
                  Aanpassen
                </button>

                <button class="btn-small" onclick="openClientCard('${client.replace(/'/g, "\\'")}')">
                  Cliëntenkaart
                </button>
              </div>
            </div>

            <div class="invoice-lines">
        `;

        grouped[client].forEach(item => {
          const amount = Number(item.amount_snapshot || 0);
          total += amount;
          clientTotal += amount;

          listEl.innerHTML += `
            <div class="invoice-line">
              <div class="line-left">
                <div class="line-service">${item.service_type || "-"}</div>
                <div class="line-meta">${item.duration_minutes || 0} min</div>
              </div>

              <div class="line-amount">${euro(amount)}</div>
            </div>
          `;
        });

        listEl.innerHTML += `
            </div>

            <div class="client-subtotal">
              <span>Subtotaal ${client}</span>
              <span>${euro(clientTotal)}</span>
            </div>
          </div>
        `;
      }

      totalEl.textContent = euro(total);
    }

    function generateInvoice(client){
      const itemsForClient = invoiceItemsData.filter(item => item.client_name === client);

      if (!itemsForClient || itemsForClient.length === 0) {
        alert("Geen factuurregels gevonden voor " + client);
        return;
      }

      localStorage.setItem("wju_invoice_client", client);
      localStorage.setItem("wju_invoice_items", JSON.stringify(itemsForClient));
      localStorage.setItem("wju_invoice_item_ids", JSON.stringify(itemsForClient.map(item => item.id)));

      window.location.href = "factuur-pdf.html?client=" + encodeURIComponent(client);
    }

    function editInvoice(client){
      alert("Factuur aanpassen voor: " + client);
    }

    function openClientCard(client){
      alert("Cliëntenkaart openen voor: " + client);
    }

    loadInvoices();
  </script>
</body>
</html>
