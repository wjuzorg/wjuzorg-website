<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Facturen - WJU Zorg</title>

  <style>
    body{
      font-family:Arial, Helvetica, sans-serif;
      background:#f3f3f3;
      margin:0;
      color:#222;
    }

    .container{
      max-width:700px;
      margin:auto;
      padding:20px;
    }

    .page-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:10px;
    }

    .back-link{
      text-decoration:none;
      background:#eee;
      padding:8px 14px;
      border-radius:8px;
      font-size:0.9rem;
      color:#333;
      white-space:nowrap;
    }

    .card{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:24px;
  border:1px solid #e3e3e3;
  box-shadow:0 3px 8px rgba(0,0,0,0.06);
}

    .total{
      font-weight:bold;
      font-size:1.2rem;
      margin-top:15px;
    }

    .small{
      font-size:0.9rem;
      color:#666;
      margin-top:10px;
      line-height:1.5;
    }

    .status{
      margin-bottom:15px;
      color:#666;
      font-size:0.95rem;
    }

    .error{
      background:#fff1f1;
      color:#a40000;
      border:1px solid #f1b5b5;
      padding:12px;
      border-radius:10px;
      margin-bottom:15px;
    }

    .empty{
      background:#fff;
      padding:18px;
      border-radius:12px;
      color:#666;
      box-shadow:0 2px 6px rgba(0,0,0,0.05);
    }

    .btn-small{
      background:#28a745;
      color:white;
      border:none;
      padding:8px 10px;
      border-radius:8px;
      font-size:0.78rem;
      cursor:pointer;
      white-space:nowrap;
    }

    .client-header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  width:100%;
  margin-bottom:14px;
  padding-bottom:10px;
  border-bottom:1px solid #eee;
}

    .client-name{
      font-weight:bold;
      flex:1;
      min-width:0;
      line-height:1.3;
      font-size:1.05rem;
    }

    .client-actions{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      justify-content:flex-end;
      max-width:58%;
    }

    .invoice-lines{
      margin-top:10px;
      border-top:1px solid #eee;
      padding-top:10px;
    }

    .invoice-line{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      padding:10px 0;
      border-bottom:1px solid #f2f2f2;
    }

    .invoice-line:last-child{
      border-bottom:none;
    }

    .line-left{
      flex:1;
      min-width:0;
    }

    .line-service{
      font-weight:600;
      margin-bottom:3px;
    }

    .line-meta{
      color:#777;
      font-size:0.9rem;
    }

    .line-amount{
      font-weight:bold;
      white-space:nowrap;
    }

    .client-subtotal{
      margin-top:12px;
      padding-top:12px;
      margin-bottom:28px;
      border-top:1px solid #ddd;
      display:flex;
      justify-content:space-between;
      font-weight:bold;
    }

    @media (max-width: 640px){
      .container{
        padding:14px;
      }

      .page-header{
        flex-direction:column;
        align-items:flex-start;
      }

      .card{
        padding:16px;
      }

      .client-header{
        flex-direction:column;
        align-items:stretch;
      }

      .client-actions{
        max-width:100%;
        justify-content:flex-start;
      }

      .btn-small{
        font-size:0.75rem;
        padding:8px 9px;
      }

      .invoice-line{
        flex-direction:column;
        align-items:flex-start;
      }

      .line-amount{
        margin-top:4px;
      }

      .client-subtotal{
        flex-direction:column;
        gap:4px;
      }

      .total{
        font-size:1.05rem;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="page-header">
      <h2>Factuur overzicht</h2>
      <a href="today.html" class="back-link">← Terug naar Today</a>
    </div>

    <div id="status" class="status">Factuurregels laden...</div>

<h3>Actieve facturen</h3>
<div id="invoiceList"></div>

<h3 style="margin-top:28px;">Betaalde facturen</h3>
<div id="paidInvoiceList"></div>

<div class="card">
  <div class="total">Actief totaal: <span id="totalAmount">€0,00</span></div>

  <div class="small">
    BTW vrijgesteld van omzetbelasting volgens artikel 11 lid 1 onderdeel g Wet OB.<br>
    Betaling binnen 14 dagen.
  </div>
</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = "https://ligdgbdhreatsuejcinq.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_sGbFKRRB3YzizqbEiz3wQg_Vkxt54_j";

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    let invoiceItemsData = [];

    function euro(amount){
      return Number(amount || 0).toLocaleString("nl-NL", {
        style: "currency",
        currency: "EUR"
      });
    }
    
    function formatDate(value){
  if(!value) return "-";
  const d = new Date(value);
  if (isNaN(d)) return "-";
  return d.toLocaleDateString("nl-NL");
}

function daysSince(dateString){
  if(!dateString) return 0;
  const sent = new Date(dateString);
  if (isNaN(sent)) return 0;

  const diffMs = new Date() - sent;
  return Math.floor(diffMs / (1000 * 60 * 60 * 24));
}

async function markPaid(id){
  const { error } = await supabaseClient
    .from("invoice_items")
    .update({
      status: "betaald",
      paid_at: new Date().toISOString()
    })
    .eq("id", id);

  if(error){
    alert("Fout bij opslaan als betaald: " + error.message);
    return;
  }

  loadInvoices();
}

async function sendReminder(id){
  const { error } = await supabaseClient
    .from("invoice_items")
    .update({
      status: "herinnering_verstuurd"
    })
    .eq("id", id);

  if(error){
    alert("Fout bij herinnering: " + error.message);
    return;
  }

  loadInvoices();
}

    async function loadInvoices() {
      const statusEl = document.getElementById("status");
const listEl = document.getElementById("invoiceList");
const paidListEl = document.getElementById("paidInvoiceList");
const totalEl = document.getElementById("totalAmount");

      statusEl.textContent = "Factuurregels laden...";
      listEl.innerHTML = "";
paidListEl.innerHTML = "";
totalEl.textContent = "€0,00";

      const { data, error } = await supabaseClient
  .from("invoice_items")
  .select("*")
  .in("status", ["open", "verzonden", "herinnering_verstuurd", "betaald"])
  .order("created_at", { ascending: false });

      if (error) {
        statusEl.innerHTML = `<div class="error">Fout: ${error.message}</div>`;
        return;
      }

      invoiceItemsData = data || [];

      if (!data || data.length === 0) {
        statusEl.textContent = "Nog geen facturen.";
        return;
      }

      statusEl.textContent = "";

      let total = 0;

const activeGrouped = {};
const paidGrouped = {};

data.forEach(item => {
  const client = item.client_name || "Onbekende cliënt";

  if (item.status === "betaald") {
    if (!paidGrouped[client]) paidGrouped[client] = [];
    paidGrouped[client].push(item);
  } else {
    if (!activeGrouped[client]) activeGrouped[client] = [];
    activeGrouped[client].push(item);
  }
});

      for (const client in activeGrouped) {
        let clientTotal = 0;

        listEl.innerHTML += `
          <div class="card">
            <div class="client-header">
              <div class="client-name">${client}</div>

              <div class="client-actions">
                <button class="btn-small" onclick="generateInvoice('${client.replace(/'/g, "\\'")}')">
                  Factuur
                </button>

                <button class="btn-small" onclick="editInvoice('${client.replace(/'/g, "\\'")}')">
                  Aanpassen
                </button>

                <button class="btn-small" onclick="openClientCard('${client.replace(/'/g, "\\'")}')">
                  Cliëntenkaart
                </button>
              </div>
            </div>

            <div class="invoice-lines">
        `;

       activeGrouped[client].forEach(item => {
  const amount = Number(item.amount_snapshot || 0);
  const itemStatus = item.status || "open";
  const sentDays = daysSince(item.sent_at);
  const reminderNeeded =
    (itemStatus === "verzonden" || itemStatus === "herinnering_verstuurd") &&
    sentDays >= 16 &&
    itemStatus !== "betaald";

  total += amount;
  clientTotal += amount;

  listEl.innerHTML += `
    <div class="invoice-line">
      <div class="line-left">
        <div class="line-service">${item.service_type || "-"}</div>
        <div class="line-meta">${item.duration_minutes || 0} min</div>
        <div class="line-meta">Status: ${itemStatus}</div>
        <div class="line-meta">Verzonden op: ${formatDate(item.sent_at)}</div>
        ${
          reminderNeeded
            ? `<div class="line-meta" style="color:#c40000; font-weight:bold;">Herinnering nodig</div>`
            : ``
        }

        <div style="margin-top:8px; display:flex; gap:8px; flex-wrap:wrap;">
          ${
            itemStatus !== "betaald"
              ? `<button class="btn-small" onclick="markPaid('${item.id}')">Betaald</button>`
              : ``
          }

          ${
            reminderNeeded
              ? `<button class="btn-small" onclick="sendReminder('${item.id}')">Herinnering</button>`
              : ``
          }
        </div>
      </div>

      <div class="line-amount">${euro(amount)}</div>
    </div>
  `;
});

        listEl.innerHTML += `
            </div>

            <div class="client-subtotal">
              <span>Subtotaal ${client}</span>
              <span>${euro(clientTotal)}</span>
            </div>
          </div>
        `;
      }
      
      for (const client in paidGrouped) {
  let clientTotal = 0;

  paidListEl.innerHTML += `
    <div class="card">
      <div class="client-header">
        <div class="client-name">${client}</div>

        <div class="client-actions">
          <button class="btn-small" onclick="openClientCard('${client.replace(/'/g, "\\'")}')">
            Cliëntenkaart
          </button>
        </div>
      </div>

      <div class="invoice-lines">
  `;

  paidGrouped[client].forEach(item => {
    const amount = Number(item.amount_snapshot || 0);
    const itemStatus = item.status || "betaald";
    clientTotal += amount;

    paidListEl.innerHTML += `
      <div class="invoice-line">
        <div class="line-left">
          <div class="line-service">${item.service_type || "-"}</div>
          <div class="line-meta">${item.duration_minutes || 0} min</div>
          <div class="line-meta">Status: ${itemStatus}</div>
          <div class="line-meta">Verzonden op: ${formatDate(item.sent_at)}</div>
          <div class="line-meta">Betaald op: ${formatDate(item.paid_at)}</div>
        </div>

        <div class="line-amount">${euro(amount)}</div>
      </div>
    `;
  });

  paidListEl.innerHTML += `
      </div>

      <div class="client-subtotal">
        <span>Subtotaal ${client}</span>
        <span>${euro(clientTotal)}</span>
      </div>
    </div>
  `;
}

      totalEl.textContent = euro(total);
    }

    function generateInvoice(client){
      const itemsForClient = invoiceItemsData.filter(item => item.client_name === client);

      if (!itemsForClient || itemsForClient.length === 0) {
        alert("Geen factuurregels gevonden voor " + client);
        return;
      }

      localStorage.setItem("wju_invoice_client", client);
      localStorage.setItem("wju_invoice_items", JSON.stringify(itemsForClient));
      localStorage.setItem("wju_invoice_item_ids", JSON.stringify(itemsForClient.map(item => item.id)));

      window.location.href = "factuur-pdf.html?client=" + encodeURIComponent(client);
    }

   

   async function editInvoice(client){
  const itemsForClient = invoiceItemsData.filter(item => item.client_name === client);

  if (!itemsForClient || itemsForClient.length === 0) {
    alert("Geen factuurregels gevonden voor " + client);
    return;
  }

  const item = itemsForClient[0];

  const newService = prompt("Nieuwe soort hulp:", item.service_type || "");
  if (newService === null) return;

  const newMinutes = prompt("Nieuwe minuten:", item.duration_minutes || 0);
  if (newMinutes === null) return;

  const newAmount = prompt("Nieuw bedrag:", item.amount_snapshot || 0);
  if (newAmount === null) return;

  const { error } = await supabaseClient
    .from("invoice_items")
    .update({
      service_type: newService,
      duration_minutes: Number(newMinutes),
      amount_snapshot: Number(newAmount)
    })
    .eq("id", item.id);

  if (error) {
    alert("Fout bij aanpassen: " + error.message);
    return;
  }

  loadInvoices();
}

function openClientCard(client){
  window.location.href = "clientkaart.html?client=" + encodeURIComponent(client);
}

loadInvoices();
  </script>
</body>
</html>
