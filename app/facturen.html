<!doctype html>
<html lang="nl">

<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Facturen - WJU Zorg</title>

<style>

body{
font-family:Arial;
background:#f3f3f3;
margin:0;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:8px;
}

.total{
font-weight:bold;
font-size:1.2rem;
margin-top:15px;
}

.btn{
background:#28a745;
color:white;
padding:15px;
border:none;
border-radius:10px;
width:100%;
font-weight:bold;
margin-top:20px;
cursor:pointer;
}

.small{
font-size:0.85rem;
color:#666;
margin-top:10px;
}

.status{
margin-bottom:15px;
color:#888;
}

</style>
</head>


<body>

<div class="container">

<h2>Factuur overzicht</h2>

<div id="status" class="status">Laden...</div>

<div id="invoiceList"></div>

<div class="card">

<div class="total">
Totaal: <span id="totalAmount">€0</span>
</div>

<div class="small">
BTW vrijgesteld van omzetbelasting volgens artikel 11 lid 1 onderdeel g Wet OB.<br>
Betaling binnen 14 dagen.
</div>

<button class="btn" onclick="generateInvoice()">
Genereer factuur
</button>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "https://ligdgbdhreatsuejcinq.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_sGbFKRRB3YzizqbEiz3wQg_Vkxt54_j";

const supabase = window.supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);


function euro(amount){

return Number(amount || 0).toLocaleString(
"nl-NL",
{
style:"currency",
currency:"EUR"
}
);

}


async function loadInvoices(){

const status = document.getElementById("status");
const list = document.getElementById("invoiceList");

status.innerText = "Factuurregels laden...";


const { data, error } = await supabase
.from("invoice_items")
.select("*")
.order("created_at",{ascending:false});


console.log("invoice_items data:",data);
console.log("invoice_items error:",error);


if(error){

status.innerText = "Fout: " + error.message;
return;

}


if(!data || data.length === 0){

status.innerText = "Nog geen factuurregels gevonden.";
return;

}


status.innerText = "";

let total = 0;

data.forEach(item => {

const amount = Number(item.amount_snapshot || 0);

total += amount;

list.innerHTML += `

<div class="card">

<div class="row">
<span>${item.client_name || "Onbekende cliënt"}</span>
<span>${euro(amount)}</span>
</div>

<div class="small">
${item.service_type || "-"} • ${item.duration_minutes || 0} min
</div>

</div>

`;

});


document.getElementById("totalAmount").innerText = euro(total);

}



function generateInvoice(){

alert("Hier gaan we straks de PDF factuur genereren 🔥");

}


loadInvoices();

</script>


</body>
</html>
