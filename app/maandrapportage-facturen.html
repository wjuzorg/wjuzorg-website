<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Maandrapportage facturen - WJU Zorg</title>

  <style>
    @media print{
      .btn{
        display:none;
      }

      body{
        background:white;
      }

      .container{
        max-width:none;
        padding:0;
      }

      .card{
        box-shadow:none;
        border:1px solid #ddd;
        break-inside:avoid;
      }

      .topbar{
        display:block;
        margin-bottom:20px;
      }
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      background:#f3f3f3;
      margin:0;
      color:#222;
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
      border:1px solid #e3e3e3;
      box-shadow:0 3px 8px rgba(0,0,0,0.06);
    }

    .section-title{
      font-weight:bold;
      margin-bottom:12px;
      font-size:1.1rem;
    }

    .row{
      display:flex;
      justify-content:space-between;
      padding:8px 0;
      border-bottom:1px solid #eee;
      gap:12px;
    }

    .row:last-child{
      border-bottom:none;
    }

    .btn{
      background:#28a745;
      color:white;
      border:none;
      padding:10px 14px;
      border-radius:8px;
      cursor:pointer;
      text-decoration:none;
      display:inline-block;
      font-size:0.95rem;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
      flex-wrap:wrap;
      gap:10px;
    }

    .muted{
      color:#666;
      font-size:0.92rem;
    }

    .danger{
      color:#c40000;
      font-weight:bold;
    }

    .status-pill{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      font-size:0.82rem;
      background:#f1f1f1;
    }

    .status-open{ background:#f3f3f3; }
    .status-verzonden{ background:#e8f1ff; }
    .status-herinnering{ background:#fff4dd; }
    .status-betaald{ background:#e8f8ec; }

    @media (max-width:640px){
      .row{
        flex-direction:column;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div style="text-align:center; margin:30px 0 10px 0;">
    <img src="logofactuur.jpg" alt="WJU Zorg" style="max-width:220px;">
  </div>

  <div class="topbar">
    <h2>Maandrapportage facturen</h2>

    <div class="card" style="margin-top:10px;">
      <div class="section-title">Kies maand</div>

      <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
        <input type="month" id="reportMonth">
        <button class="btn" onclick="loadRapport()">Rapport tonen</button>
      </div>
    </div>

    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn" onclick="window.print()">Rapport / PDF</button>
      <a href="today.html" class="btn">← Terug naar Today</a>
    </div>
  </div>

  <div id="rapport"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const SUPABASE_URL = "https://ligdgbdhreatsuejcinq.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_sGbFKRRB3YzizqbEiz3wQg_Vkxt54_j";

  const supabaseClient = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

  function euro(amount){
    return Number(amount || 0).toLocaleString("nl-NL", {
      style: "currency",
      currency: "EUR"
    });
  }

  function formatDate(value){
    if(!value) return "-";
    const d = new Date(value);
    if (isNaN(d)) return "-";
    return d.toLocaleDateString("nl-NL");
  }

  function setDefaultMonth(){
    const monthInput = document.getElementById("reportMonth");
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, "0");
    monthInput.value = `${year}-${month}`;
  }

  function statusLabel(status){
    if(status === "open") return "Open";
    if(status === "verzonden") return "Verzonden";
    if(status === "herinnering_verstuurd") return "Herinnering verstuurd";
    if(status === "betaald") return "Betaald";
    return status || "-";
  }

  function statusClass(status){
    if(status === "open") return "status-open";
    if(status === "verzonden") return "status-verzonden";
    if(status === "herinnering_verstuurd") return "status-herinnering";
    if(status === "betaald") return "status-betaald";
    return "";
  }

  async function loadRapport(){
    const rapportEl = document.getElementById("rapport");
    const selectedMonth = document.getElementById("reportMonth").value;

    if(!selectedMonth){
      rapportEl.innerHTML = `<div class="card">Kies eerst een maand.</div>`;
      return;
    }

    const [year, month] = selectedMonth.split("-");

    const { data, error } = await supabaseClient
      .from("invoice_items")
      .select("*")
      .in("status", ["open", "verzonden", "herinnering_verstuurd", "betaald"])
      .order("created_at", { ascending: false });

    if(error){
      rapportEl.innerHTML = `<div class="card">Fout bij laden rapport: ${error.message}</div>`;
      return;
    }

    const items = (data || []).filter(item => {
      if(!item.created_at) return false;
      const d = new Date(item.created_at);
      const itemYear = String(d.getFullYear());
      const itemMonth = String(d.getMonth() + 1).padStart(2, "0");
      return itemYear === year && itemMonth === month;
    });

    let totalFacturen = 0;
    let totaalBedrag = 0;
    let openstaandBedrag = 0;
    let betaaldBedrag = 0;

    let countOpen = 0;
    let countVerzonden = 0;
    let countHerinnering = 0;
    let countBetaald = 0;

    const perClient = {};
    const openRows = [];
    const betaaldRows = [];

    items.forEach(item => {
      const amount = Number(item.amount_snapshot || 0);
      const client = item.client_name || "Onbekende cliënt";
      const status = item.status || "open";

      totalFacturen++;
      totaalBedrag += amount;

      if(!perClient[client]){
        perClient[client] = {
          totaal: 0,
          openstaand: 0,
          betaald: 0,
          aantal: 0
        };
      }

      perClient[client].totaal += amount;
      perClient[client].aantal += 1;

      if(status === "open"){
        countOpen++;
        openstaandBedrag += amount;
        perClient[client].openstaand += amount;
      }

      if(status === "verzonden"){
        countVerzonden++;
        openstaandBedrag += amount;
        perClient[client].openstaand += amount;
      }

      if(status === "herinnering_verstuurd"){
        countHerinnering++;
        openstaandBedrag += amount;
        perClient[client].openstaand += amount;
      }

      if(status === "betaald"){
        countBetaald++;
        betaaldBedrag += amount;
        perClient[client].betaald += amount;
      }

      const rowHtml = `
        <div class="row">
          <div>
            <strong>${client}</strong><br>
            <span class="muted">${item.service_type || "-"} • ${item.duration_minutes || 0} min</span><br>
            <span class="muted">Verzonden op: ${formatDate(item.sent_at)}</span>
            ${
              item.reminder_sent_at
                ? `<br><span class="muted">Herinnering op: ${formatDate(item.reminder_sent_at)}</span>`
                : ``
            }
            ${
              item.paid_at
                ? `<br><span class="muted">Betaald op: ${formatDate(item.paid_at)}</span>`
                : ``
            }
          </div>

          <div style="text-align:right;">
            <div>${euro(amount)}</div>
            <div class="status-pill ${statusClass(status)}">${statusLabel(status)}</div>
          </div>
        </div>
      `;

      if(status === "betaald"){
        betaaldRows.push(rowHtml);
      } else {
        openRows.push(rowHtml);
      }
    });

    let perClientHtml = "";
    Object.keys(perClient).sort().forEach(client => {
      perClientHtml += `
        <div class="row">
          <div>
            <strong>${client}</strong><br>
            <span class="muted">${perClient[client].aantal} factuurregel(s)</span>
          </div>
          <div style="text-align:right;">
            <div>Totaal: ${euro(perClient[client].totaal)}</div>
            <div class="muted">Openstaand: ${euro(perClient[client].openstaand)}</div>
            <div class="muted">Betaald: ${euro(perClient[client].betaald)}</div>
          </div>
        </div>
      `;
    });

    if(!perClientHtml){
      perClientHtml = `<div class="row"><div>Geen facturen gevonden</div><div>-</div></div>`;
    }

    const openHtml = openRows.length
      ? openRows.join("")
      : `<div class="row"><div>Geen openstaande facturen in deze maand</div><div>-</div></div>`;

    const betaaldHtml = betaaldRows.length
      ? betaaldRows.join("")
      : `<div class="row"><div>Geen betaalde facturen in deze maand</div><div>-</div></div>`;

    rapportEl.innerHTML = `
      <div class="card">
        <div class="section-title">Overzicht</div>

        <div class="row">
          <div>Factuurregels</div>
          <div>${totalFacturen}</div>
        </div>

        <div class="row">
          <div>Totaalbedrag</div>
          <div>${euro(totaalBedrag)}</div>
        </div>

        <div class="row">
          <div>Openstaand bedrag</div>
          <div class="${openstaandBedrag > 0 ? 'danger' : ''}">${euro(openstaandBedrag)}</div>
        </div>

        <div class="row">
          <div>Betaald bedrag</div>
          <div>${euro(betaaldBedrag)}</div>
        </div>

        <div class="row">
          <div>Open</div>
          <div>${countOpen}</div>
        </div>

        <div class="row">
          <div>Verzonden</div>
          <div>${countVerzonden}</div>
        </div>

        <div class="row">
          <div>Herinnering verstuurd</div>
          <div>${countHerinnering}</div>
        </div>

        <div class="row">
          <div>Betaald</div>
          <div>${countBetaald}</div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">Per cliënt</div>
        ${perClientHtml}
      </div>

      <div class="card">
        <div class="section-title">Openstaande facturen</div>
        ${openHtml}
      </div>

      <div class="card">
        <div class="section-title">Betaalde facturen</div>
        ${betaaldHtml}
      </div>
    `;
  }

  setDefaultMonth();
  loadRapport();
</script>
</body>
</html>
