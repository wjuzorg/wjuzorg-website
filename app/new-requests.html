<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nieuwe aanvragen - WJU Zorg</title>
  <link rel="stylesheet" href="app.css?v=2" />

  <style>
    body {
      background: #f6f6f6;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    .container {
      padding: 20px;
      max-width: 700px;
      margin: auto;
    }

    .toplink {
      display: inline-block;
      text-decoration: none;
      color: #111;
      font-weight: bold;
      margin-bottom: 18px;
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 14px;
      margin-bottom: 16px;
      border: 1px solid #eee;
    }

    .name {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .info {
      font-size: 15px;
      margin-bottom: 7px;
      color: #222;
      line-height: 1.4;
    }

    .buttons {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    .btn-call {
      background: #f59e0b;
      color: white;
    }

    .btn-plan {
      background: #10b981;
      color: white;
    }

    .btn-close {
      background: #ef4444;
      color: white;
    }

    .empty {
      background: white;
      padding: 18px;
      border-radius: 14px;
      border: 1px solid #eee;
      color: #666;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>🆕 Nieuwe aanvragen</h2>

    <div style="margin-bottom:15px;">
      <a href="today.html" class="toplink">← Terug naar Today</a>
    </div>

    <div id="list"><p>Laden...</p></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <script>
    const SUPABASE_URL = "https://ligdgbdhreatsuejcinq.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_sGbFKRRB3YzizqbEiz3wQg_Vkxt54_j";
    const MIJN_ORG_ID = "4121dd3f-9d21-42b6-ab38-dccf791bfaaf";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function formatDateTime(value) {
      if (!value) return "";
      try {
        return new Date(value).toLocaleString("nl-NL");
      } catch (e) {
        return value;
      }
    }

    function serviceLabel(service) {
      if (!service) return "-";
      if (service === "naar_afspraak") return "Zorgafspraak";
      return service;
    }

    async function loadRequests() {
      const list = document.getElementById("list");
      list.innerHTML = "<p>Laden...</p>";

      const { data, error } = await supabaseClient
        .from("requests")
        .select("*")
        .eq("org_id", MIJN_ORG_ID)
        .eq("status", "nieuw")
        .order("created_at", { ascending: false });

      if (error) {
        console.error("Laadfout:", error);
        list.innerHTML = "<div class='empty' style='color:red;'>Fout bij laden: " + error.message + "</div>";
        return;
      }

      if (!data || data.length === 0) {
        list.innerHTML = "<div class='empty'>Geen nieuwe aanvragen gevonden.</div>";
        return;
      }

      list.innerHTML = "";

      data.forEach((r) => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <div class="name">${r.full_name || "Onbekend"}</div>
          <div class="info">📞 ${r.phone || "-"}</div>
          <div class="info">🧾 Dienst: ${serviceLabel(r.service)}</div>
          <div class="info">📍 Adres: ${r.address || "-"}</div>
          <div class="info">🕒 Status: ${r.status || "-"}</div>
          ${r.destination ? `<div class="info">📍 Naar: ${r.destination}</div>` : ""}
          ${r.appointment_time ? `<div class="info">🗓️ Afspraak: ${formatDateTime(r.appointment_time)}</div>` : ""}
          ${r.needs_support ? `<div class="info">👥 Begeleiding: ${r.needs_support}</div>` : ""}
          ${r.preferred_daypart ? `<div class="info">📱 Terugbellen: ${r.preferred_daypart}</div>` : ""}
          ${r.message ? `<div class="info">📝 ${r.message}</div>` : ""}

          <div class="buttons">
            <button class="btn btn-call" type="button" onclick="updateStatus('${r.id}','terugbellen')">Terugbellen</button>
            <button class="btn btn-plan" type="button" onclick="planRequest('${r.id}')">Inplannen</button>
            <button class="btn btn-close" type="button" onclick="updateStatus('${r.id}','gesloten')">Afsluiten</button>
          </div>
        `;

        list.appendChild(div);
      });
    }

    async function updateStatus(id, status) {
      try {
        const { data, error } = await supabaseClient
          .from("requests")
          .update({ status: status })
          .eq("id", id)
          .eq("org_id", MIJN_ORG_ID)
          .select();

        if (error) {
          alert("Fout bij updaten: " + error.message);
          console.error("Updatefout:", error);
          return;
        }

        if (!data || data.length === 0) {
          alert("De status is niet aangepast. De update wordt nu nog geblokkeerd in Supabase.");
          console.error("Geen rijen aangepast", { id, status });
          return;
        }

        if (status === "terugbellen") {
          alert("Doorgezet naar Nog terug te bellen.");
        }

        if (status === "gesloten") {
          alert("Aanvraag afgesloten.");
        }

        loadRequests();
      } catch (err) {
        alert("Onverwachte fout bij updaten.");
        console.error(err);
      }
    }

    async function planRequest(id) {
      try {
        const { data: row, error: readError } = await supabaseClient
          .from("requests")
          .select("appointment_time, planned_date, planned_time_block")
          .eq("id", id)
          .eq("org_id", MIJN_ORG_ID)
          .single();

        if (readError) {
          alert("Fout bij ophalen van aanvraag: " + readError.message);
          console.error("Leesfout:", readError);
          return;
        }

        let afspraakTijd = null;

        if (row.appointment_time) {
          afspraakTijd = row.appointment_time;
        }

        if (!afspraakTijd && row.planned_date && row.planned_time_block) {
          let tijd = null;

          if (row.planned_time_block === "ochtend") tijd = "09:00:00";
          if (row.planned_time_block === "middag") tijd = "13:00:00";
          if (row.planned_time_block === "avond_tot_1900") tijd = "17:00:00";
          if (row.planned_time_block === "maakt_niet_uit") tijd = "10:00:00";

          if (tijd) {
            afspraakTijd = `${row.planned_date}T${tijd}`;
          }
        }

        const updatePayload = { status: "ingepland" };
        if (afspraakTijd) {
          updatePayload.appointment_time = afspraakTijd;
        }

        const { data, error } = await supabaseClient
          .from("requests")
          .update(updatePayload)
          .eq("id", id)
          .eq("org_id", MIJN_ORG_ID)
          .select();

        if (error) {
          alert("Fout bij inplannen: " + error.message);
          console.error("Planfout:", error);
          return;
        }

        if (!data || data.length === 0) {
          alert("Inplannen is niet gelukt. De update wordt nu nog geblokkeerd in Supabase.");
          console.error("Geen rijen aangepast bij planRequest", { id });
          return;
        }

        alert("Aanvraag ingepland.");
        loadRequests();
      } catch (err) {
        alert("Onverwachte fout bij inplannen.");
        console.error(err);
      }
    }

    loadRequests();
  </script>
</body>
</html>
