<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nieuwe aanvragen - WJU Zorg</title>
<link rel="stylesheet" href="app.css?v=2">

<style>

body{
background:#f6f6f6;
font-family:Arial;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:18px;
border-radius:14px;
margin-bottom:15px;
border:1px solid #eee;
}

.header{
font-size:1.3rem;
font-weight:bold;
margin-bottom:6px;
}

.info{
color:#555;
line-height:1.5;
margin-bottom:15px;
}

.planbox{
background:#f9fafb;
padding:12px;
border-radius:10px;
margin-top:10px;
}

.input{
padding:8px;
border-radius:6px;
border:1px solid #ddd;
margin-right:8px;
margin-top:6px;
}

.btn{
padding:10px 14px;
border-radius:8px;
border:none;
cursor:pointer;
font-weight:bold;
}

.btn-green{
background:#28a745;
color:white;
}

.btn-grey{
background:#999;
color:white;
}

</style>
</head>

<body>

<div class="container">

<h2>Nieuwe aanvragen</h2>

<a href="today.html" style="display:inline-block;margin-bottom:20px;text-decoration:none;font-weight:bold;">
← Terug naar Today
</a>

<div id="list"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script>

const SUPABASE_URL = "https://ligdgbdhreatsuejcinq.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_sGbFKRRB3YzizqbEiz3wQg_Vkxt54_j";
const MIJN_ORG_ID = "4121dd3f-9d21-42b6-ab38-dccf791bfaaf";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loadRequests(){

const list=document.getElementById("list")

const {data,error}=await supabase
.from("requests")
.select("*")
.eq("org_id",MIJN_ORG_ID)
.eq("status","nieuw")
.order("created_at",{ascending:false})

if(error){
list.innerHTML="Fout bij laden"
return
}

list.innerHTML=""

if(!data.length){
list.innerHTML="Geen nieuwe aanvragen"
return
}

data.forEach(item=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="header">
${item.full_name || "Onbekend"}
</div>

<div class="info">
📞 ${item.phone || "-"}<br>
📍 ${item.address || "-"}<br>
🧰 ${item.service || "-"}<br>
${item.message ? "📝 "+item.message : ""}
</div>

<div class="planbox">

<strong>Afspraak plannen</strong><br>

<input class="input" type="date" id="date-${item.id}">
<input class="input" type="time" id="time-${item.id}">

<select class="input" id="duration-${item.id}">
<option value="60">60 min</option>
<option value="90">90 min</option>
<option value="120">120 min</option>
</select>

<br><br>

<input class="input" style="width:80%" placeholder="Interne notitie" id="note-${item.id}">

<br><br>

<button class="btn btn-green" onclick="plan('${item.id}')">
Opslaan + inplannen
</button>

<button class="btn btn-grey" onclick="closeRequest('${item.id}')">
Afsluiten
</button>

</div>
`

list.appendChild(card)

})

}

async function plan(id){

const date=document.getElementById(`date-${id}`).value
const time=document.getElementById(`time-${id}`).value
const duration=document.getElementById(`duration-${id}`).value
const note=document.getElementById(`note-${id}`).value

if(!date || !time){
alert("Datum en tijd invullen")
return
}

const datetime=`${date}T${time}:00`

const {error}=await supabase
.from("requests")
.update({
appointment_time:datetime,
duration_minutes:duration,
internal_notes:note,
status:"ingepland"
})
.eq("id",id)
.eq("org_id",MIJN_ORG_ID)

if(error){
alert(error.message)
return
}

location.href="today.html"

}

async function closeRequest(id){

const confirmClose=confirm("Aanvraag afsluiten?")

if(!confirmClose) return

await supabase
.from("requests")
.update({
status:"gesloten"
})
.eq("id",id)
.eq("org_id",MIJN_ORG_ID)

location.reload()

}

loadRequests()

</script>

</body>
</html>
