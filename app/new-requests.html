<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nieuwe aanvragen - WJU Zorg</title>

  <link rel="stylesheet" href="app.css?v=2">

  <style>
    body {
      background:#f6f6f6;
      font-family: Arial, sans-serif;
    }

    .container {
      padding:20px;
      max-width:600px;
      margin:auto;
    }

    .card {
      background:white;
      padding:15px;
      border-radius:12px;
      margin-bottom:15px;
      border:1px solid #eee;
    }

    .name {
      font-weight:bold;
      font-size:18px;
      margin-bottom:5px;
    }

    .info {
      font-size:14px;
      margin-bottom:5px;
    }

    .buttons {
      margin-top:10px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn {
      padding:8px 12px;
      border-radius:8px;
      border:none;
      cursor:pointer;
      font-size:14px;
    }

    .btn-call {
      background:#f59e0b;
      color:white;
    }

    .btn-plan {
      background:#10b981;
      color:white;
    }

    .btn-close {
      background:#ef4444;
      color:white;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🆕 Nieuwe aanvragen</h2>

  <div id="list"></div>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  "https://ligdgbdhreatsuejcinq.supabase.co",
  "sb_publishable_sGbFKRRB3YzizqbEiz3wQg_Vkxt54_j"
);

async function loadRequests() {
  const { data, error } = await supabase
    .from("requests")
    .select("*")
    .eq("status", "nieuw")
    .order("created_at", { ascending: false });

  const list = document.getElementById("list");
  list.innerHTML = "";

  if (!data || data.length === 0) {
    list.innerHTML = "<p>Geen nieuwe aanvragen</p>";
    return;
  }

  data.forEach(r => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="name">${r.full_name || "Onbekend"}</div>
      <div class="info">📞 ${r.phone || "-"}</div>
      <div class="info">🛠️ ${r.service || "-"}</div>
      <div class="info">📝 ${r.message || ""}</div>

      <div class="buttons">
        <button class="btn btn-call" onclick="updateStatus('${r.id}','terugbellen')">Terugbellen</button>
        <button class="btn btn-plan" onclick="updateStatus('${r.id}','ingepland')">Inplannen</button>
        <button class="btn btn-close" onclick="updateStatus('${r.id}','gesloten')">Afsluiten</button>
      </div>
    `;

    list.appendChild(div);
  });
}

async function updateStatus(id, status) {
  await supabase
    .from("requests")
    .update({ status: status })
    .eq("id", id);

  loadRequests();
}

loadRequests();
</script>

</body>
</html>
