<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bedankt - WJU Zorg</title>
  <link rel="stylesheet" href="app.css" />
  <style>
    /* Specifieke styling voor extra rust en leesbaarheid */
    .thank-you-card {
      text-align: center;
      padding: 40px 20px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      border: 1px solid #eee;
    }
    .check-icon {
      font-size: 60px;
      color: #2e7d32; /* Rustgevend groen */
      margin-bottom: 20px;
    }
    h2 {
      font-size: 2rem; /* Groter lettertype */
      margin-bottom: 24px;
      color: #333;
    }
    .trust-large {
      font-size: 1.3rem; /* Comfortabele leesgrootte */
      line-height: 1.6;
      margin-bottom: 30px;
      color: #444;
    }
    .contact-box {
      background: #f9f9f9;
      padding: 20px;
      border-radius: 8px;
      margin-top: 30px;
      border: 2px dashed #ccc;
    }
    .phone-number {
      display: block;
      font-size: 1.5rem;
      font-weight: bold;
      color: #000;
      text-decoration: none;
      margin-top: 10px;
    }
    .btn-home {
      display: inline-block;
      padding: 18px 36px;
      font-size: 1.2rem;
      background-color: #000;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body class="form-page">
  <div class="header">
    <div class="header-top">
      <div class="brand">
        <div class="brand-title">WJU Zorg</div>
        <div class="brand-sub">Persoonlijke ondersteuning aan huis</div>
      </div>
      <img class="logo" src="./logo.png" alt="WJU Zorg logo">
    </div>
  </div>

  <main class="container">
    <div class="thank-you-card">
      <div class="check-icon" aria-hidden="true">✓</div>
      
      <h2>Gelukt, uw aanvraag is verstuurd</h2>
      
      <p class="trust-large">
        Dank u wel. Wij hebben uw gegevens goed ontvangen.<br>
        <strong>Wij bellen u binnen 24 uur op</strong> om uw aanvraag door te nemen.
      </p>

      <a class="btn-home" href="index.html">Terug naar het overzicht</a>

      <div class="contact-box">
        <p>Heeft u een dringende vraag?</p>
        <span>U kunt ons direct bellen op:</span>
        <a href="tel:0638287648" class="phone-number">06 - 38 28 76 48</a>
      </div>
    </div>
  </main>
</body>
</html>
