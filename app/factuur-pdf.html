<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Factuur PDF - WJU Zorg</title>

  <style>
    body{
      font-family: Arial, Helvetica, sans-serif;
      background:#f3f3f3;
      margin:0;
      color:#222;
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:24px;
    }

    .card{
      background:white;
      padding:34px;
      border-radius:14px;
      border:1px solid #e3e3e3;
      box-shadow:0 3px 8px rgba(0,0,0,0.06);
    }

    .top-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:24px;
    }

    .btn{
      background:#28a745;
      color:white;
      border:none;
      padding:12px 16px;
      border-radius:10px;
      cursor:pointer;
      text-decoration:none;
      display:inline-block;
      font-size:1rem;
    }

    .btn-secondary{
      background:#e9ecef;
      color:#333;
    }

    .header-logo{
      margin-bottom:22px;
    }

    .header-logo img{
      max-width:140px;
      height:auto;
    }

    .invoice-top{
      display:flex;
      justify-content:space-between;
      gap:20px;
      align-items:flex-start;
      margin-bottom:28px;
      flex-wrap:wrap;
    }

    .title{
      font-size:2.2rem;
      font-weight:bold;
      margin:0 0 18px 0;
    }

    .company-block{
      line-height:1.45;
      font-size:0.98rem;
    }

    .topbar-right{
      text-align:right;
      line-height:1.7;
      font-size:1rem;
      min-width:220px;
    }

    .client-block{
      margin:22px 0 26px 0;
      line-height:1.5;
      font-size:1rem;
    }

    .client-name{
      font-weight:bold;
      font-size:1.05rem;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:12px;
    }

    th, td{
      padding:12px 8px;
      border-bottom:1px solid #ddd;
      text-align:left;
      vertical-align:top;
    }

    th.right, td.right{
      text-align:right;
    }

    .total-row td{
      border-top:2px solid #bbb;
      border-bottom:none;
      font-weight:bold;
      font-size:1.15rem;
      padding-top:14px;
    }

    .footer-note{
      margin-top:26px;
      line-height:1.6;
      font-size:0.98rem;
    }

    .muted{
      color:#666;
    }

    @media print{
      body{
        background:white;
      }

      .container{
        max-width:none;
        padding:0;
      }

      .top-actions{
        display:none;
      }

      .card{
        box-shadow:none;
        border:none;
        border-radius:0;
        padding:0;
      }
    }

    @media (max-width:640px){
      .card{
        padding:20px;
      }

      .invoice-top{
        flex-direction:column;
      }

      .topbar-right{
        text-align:left;
      }

      .title{
        font-size:1.8rem;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">

      <div class="header-logo">
        <img src="logofactuur.jpg" alt="WJU Zorg logo">
      </div>

      <div class="top-actions">
        <a href="facturen.html" class="btn btn-secondary">← Terug</a>
        <button class="btn" onclick="printInvoice()">Print / Opslaan als PDF</button>
      </div>

      <div class="invoice-top">
        <div>
          <h1 class="title">Conceptfactuur</h1>

          <div class="company-block">
            <strong>WJU Zorg</strong><br>
            Zenithstraat 21, 3582 PK Utrecht<br>
            wjuzorg@gmail.com | KVK: 42018479
          </div>
        </div>

        <div class="topbar-right">
          <div><strong>Factuurdatum:</strong> <span id="invoiceDate">-</span></div>
          <div><strong>Betaaltermijn:</strong> binnen 14 dagen</div>
        </div>
      </div>

      <div class="client-block">
        <div class="client-name" id="clientName">-</div>
        <div id="clientAddress">-</div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Dienst</th>
            <th class="right">Min.</th>
            <th class="right">Bedrag</th>
          </tr>
        </thead>
        <tbody id="invoiceTableBody"></tbody>
        <tfoot>
          <tr class="total-row">
            <td colspan="2" class="right">Totaal:</td>
            <td class="right" id="invoiceTotal">€0,00</td>
          </tr>
        </tfoot>
      </table>

      <div class="footer-note">
        <strong>BTW:</strong> vrijgesteld (art. 11-1-g Wet OB).<br>
        Graag binnen 14 dagen voldoen op:<br>
        <strong>WJU Zorg</strong><br>
        IBAN: <strong>NL05INGB 0115 6069 55</strong>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = "https://ligdgbdhreatsuejcinq.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_sGbFKRRB3YzizqbEiz3wQg_Vkxt54_j";

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    function euro(amount){
      return Number(amount || 0).toLocaleString("nl-NL", {
        style: "currency",
        currency: "EUR"
      });
    }

    function formatDate(date){
      const d = date ? new Date(date) : new Date();
      if (isNaN(d)) return "-";
      return d.toLocaleDateString("nl-NL");
    }

    function loadInvoicePdf(){
      const client = localStorage.getItem("wju_invoice_client") || "-";
      const items = JSON.parse(localStorage.getItem("wju_invoice_items") || "[]");

      document.getElementById("invoiceDate").textContent = formatDate(new Date());
      document.getElementById("clientName").textContent = client;

      let address = "-";
      if(items.length > 0){
        address = items[0].client_address || items[0].address || "-";
      }
      document.getElementById("clientAddress").textContent = address;

      const tbody = document.getElementById("invoiceTableBody");
      tbody.innerHTML = "";

      let total = 0;

      items.forEach(item => {
        const amount = Number(item.amount_snapshot || 0);
        total += amount;

        tbody.innerHTML += `
          <tr>
            <td>${item.service_type || "-"}</td>
            <td class="right">${item.duration_minutes || 0}</td>
            <td class="right">${euro(amount)}</td>
          </tr>
        `;
      });

      document.getElementById("invoiceTotal").textContent = euro(total);
    }

    async function printInvoice() {
      const itemIds = JSON.parse(localStorage.getItem("wju_invoice_item_ids") || "[]");

      if (itemIds.length > 0) {
        const { error } = await supabaseClient
          .from("invoice_items")
          .update({
            status: "verzonden",
            sent_at: new Date().toISOString()
          })
          .in("id", itemIds);

        if (error) {
          alert("Fout bij opslaan als verzonden: " + error.message);
          return;
        }
      }

      window.print();
    }

    loadInvoicePdf();
  </script>
</body>
</html>
